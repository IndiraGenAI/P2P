<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>P2P · Procure-to-Pay</title>
    <style>
      /* ---------- App splash screen (rendered before React mounts) ---------- */
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at 20% 0%, rgba(16, 185, 129, 0.10) 0%, transparent 55%),
          radial-gradient(circle at 80% 100%, rgba(5, 150, 105, 0.08) 0%, transparent 55%),
          linear-gradient(180deg, #ffffff 0%, #f1f4f9 100%);
        font-family: 'Outfit', system-ui, -apple-system, sans-serif;
        opacity: 1;
        transition: opacity 600ms ease, visibility 600ms ease;
        will-change: opacity;
        overflow: hidden;
      }

      #app-splash::before,
      #app-splash::after {
        content: '';
        position: absolute;
        border-radius: 50%;
        filter: blur(60px);
        opacity: 0.45;
        pointer-events: none;
        animation: splash-orb 9s ease-in-out infinite alternate;
      }
      #app-splash::before {
        width: 380px;
        height: 380px;
        top: -120px;
        left: -120px;
        background: radial-gradient(circle, #6ee7b7 0%, transparent 70%);
      }
      #app-splash::after {
        width: 460px;
        height: 460px;
        bottom: -160px;
        right: -160px;
        background: radial-gradient(circle, #34d399 0%, transparent 70%);
        animation-delay: -3s;
      }

      .splash-logo-stage {
        position: relative;
        display: flex;
        align-items: center;
        gap: 16px;
        animation: splash-rise 700ms cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      .splash-logo-glow {
        position: absolute;
        inset: -28px;
        border-radius: 32px;
        background: radial-gradient(circle, rgba(16, 185, 129, 0.35) 0%, transparent 65%);
        filter: blur(18px);
        animation: splash-breathe 2.4s ease-in-out infinite;
        z-index: 0;
      }

      .splash-logo-box {
        position: relative;
        width: 88px;
        height: 88px;
        border-radius: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        flex-shrink: 0;
        background:
          radial-gradient(circle at 30% 20%, #34D399 0%, #10B981 40%, #047857 100%);
        box-shadow:
          0 20px 40px -10px rgba(5, 150, 105, 0.55),
          0 6px 12px rgba(5, 150, 105, 0.25),
          inset 0 1px 0 rgba(255, 255, 255, 0.3);
        z-index: 1;
        animation: splash-logo-pop 700ms cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }

      .splash-logo-box::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 70% 90%, rgba(0, 0, 0, 0.18) 0%, transparent 55%);
        opacity: 0.5;
      }

      .splash-logo-box::after {
        content: '';
        position: absolute;
        top: 0;
        left: -120%;
        width: 60%;
        height: 100%;
        background: linear-gradient(
          120deg,
          transparent 20%,
          rgba(255, 255, 255, 0.45) 50%,
          transparent 80%
        );
        transform: skewX(-20deg);
        animation: splash-shine 2.8s ease-in-out infinite;
      }

      .splash-logo-icon {
        position: relative;
        z-index: 2;
        animation: splash-rotate 6s linear infinite;
        transform-origin: center;
      }

      .splash-wordmark-wrap {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        line-height: 1;
        animation: splash-fade-right 800ms cubic-bezier(0.22, 1, 0.36, 1) 120ms both;
      }

      .splash-wordmark {
        font-size: 44px;
        font-weight: 800;
        color: #111827;
        letter-spacing: -0.02em;
        white-space: nowrap;
      }
      .splash-wordmark-accent {
        color: #10B981;
      }

      .splash-tagline {
        margin-top: 8px;
        font-size: 11px;
        font-weight: 600;
        color: #6b7280;
        text-transform: uppercase;
        letter-spacing: 0.22em;
        white-space: nowrap;
      }

      .splash-progress {
        position: relative;
        margin-top: 38px;
        width: 220px;
        height: 3px;
        border-radius: 999px;
        background: rgba(16, 185, 129, 0.12);
        overflow: hidden;
        animation: splash-fade-up 700ms cubic-bezier(0.22, 1, 0.36, 1) 200ms both;
      }
      .splash-progress::before {
        content: '';
        position: absolute;
        top: 0;
        left: -40%;
        width: 40%;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, transparent, #10B981, #047857, transparent);
        animation: splash-progress-slide 1.4s ease-in-out infinite;
      }

      .splash-status {
        margin-top: 16px;
        font-size: 11px;
        font-weight: 500;
        color: #94a3b8;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        animation: splash-fade-up 700ms cubic-bezier(0.22, 1, 0.36, 1) 280ms both;
      }

      /* Fade-out applied by JS once React has mounted */
      #app-splash.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #app-splash.is-hidden .splash-logo-stage {
        transform: translateY(-8px) scale(0.96);
        opacity: 0;
        transition: transform 500ms cubic-bezier(0.22, 1, 0.36, 1),
                    opacity 350ms ease;
      }

      @keyframes splash-rise {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes splash-fade-right {
        from { opacity: 0; transform: translateX(-12px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes splash-fade-up {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes splash-logo-pop {
        from { opacity: 0; transform: scale(0.6) rotate(-6deg); }
        to   { opacity: 1; transform: scale(1) rotate(0deg); }
      }
      @keyframes splash-breathe {
        0%, 100% { opacity: 0.45; transform: scale(0.96); }
        50%      { opacity: 0.85; transform: scale(1.08); }
      }
      @keyframes splash-shine {
        0%   { left: -120%; }
        60%, 100% { left: 160%; }
      }
      @keyframes splash-rotate {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes splash-progress-slide {
        0%   { left: -40%; }
        100% { left: 100%; }
      }
      @keyframes splash-orb {
        0%   { transform: translate(0, 0) scale(1); }
        100% { transform: translate(30px, 20px) scale(1.1); }
      }

      @media (prefers-reduced-motion: reduce) {
        #app-splash,
        #app-splash *,
        #app-splash::before,
        #app-splash::after {
          animation: none !important;
          transition: opacity 200ms ease !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Splash screen — visible before React mounts, fades out via main.tsx -->
    <div id="app-splash" role="status" aria-live="polite" aria-label="Loading P2P">
      <div class="splash-logo-stage">
        <span class="splash-logo-glow" aria-hidden="true"></span>
        <div class="splash-logo-box">
          <svg
            class="splash-logo-icon"
            width="46"
            height="46"
            viewBox="0 0 32 32"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path d="M16 4.5a11.5 11.5 0 0 1 11.18 8.7" stroke="white" stroke-width="2.6" stroke-linecap="round" />
            <path d="M24.5 9.5l3 3.5-3.8 1.4" stroke="white" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M16 27.5A11.5 11.5 0 0 1 4.82 18.8" stroke="white" stroke-opacity="0.7" stroke-width="2.6" stroke-linecap="round" />
            <path d="M7.5 22.5l-3-3.5 3.8-1.4" stroke="white" stroke-opacity="0.7" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" />
            <circle cx="16" cy="16" r="2.4" fill="white" />
          </svg>
        </div>
        <div class="splash-wordmark-wrap">
          <span class="splash-wordmark">P<span class="splash-wordmark-accent">2</span>P</span>
          <span class="splash-tagline">Procure&nbsp;·&nbsp;to&nbsp;·&nbsp;Pay</span>
        </div>
      </div>

      <div class="splash-progress" aria-hidden="true"></div>
      <div class="splash-status">Preparing your workspace</div>
    </div>

    <script>
      // Marker used by main.tsx to enforce a minimum splash visibility time.
      window.__splashStart = performance.now();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
